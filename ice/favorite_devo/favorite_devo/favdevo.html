<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>

    <main>
      <div class="content-box">

<tr>

<tr>

<td>2026</td>
</tr>
<tr>
<td>Elder Holland</td>

</tr>
<tr>
<td>Elder Gay</td>

<td>2026</td>
</tr>
<tr>
<td>Elder Gong</td>
<td>Our Own Best Story</td>
<td>Marriot Center BYU</td>
<td>2023</td>
</tr>
</tbody>
        </table>
      </div>
      <div class="form">
        <form>
          <label>Speaker</label>
          <input type="text">
          <label>Title</label>
          <input type="text">
          <label>Location</label>
          <input type="text">
          <label>Year</label>
          <input type="text">
        </form>
        <button>Submit</button>
      </div>
    </main>
  </div>

</html>

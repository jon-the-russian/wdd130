<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        body {
            background-color: #E8ECED;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #card {
            border: black solid 4px;
            background: blue;
            background-image: url("images/christus.webp");
            height: 800px;
            width: 600px;
        }

        h1 {
            color: #fff;
            text-align: center;
        }

        .presidency {
            display: flex;
            justify-content: center;
            align-items: center;
            justify-content: space-evenly;
        }

        .eyering {
            border: 10px solid #fff;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
        }

        .eyering img {
            width: 100px;
            height: 100px;
        }

        .prophet {
           border: 10px solid #fff;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            overflow: hidden; 
        }
        
        .prophet img {
            width: 120px;
            height: 120px;
        }

        .christopherson {
            border: 10px solid #fff;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
        }

        .christopherson img {
            width: 100px;
            height: 100px;
        }

        h3 {
            color: #fff;
            text-align: center;
        }

        .apostles {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }
 
        .apostle {
            border: 10px solid #fff;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            margin: 15px;
        }

        .apostle img {
            width: 80px;
            height: 80px;
        }

    </style>
</head>
<body>
    <div id="card">
        <h1>First Presidency</h1>
        
        <div class="presidency">
            <div class="eyering">
                <img src="images/eyring.webp">
            </div>
            <div class="prophet">
                <img src="images/oaks.webp">
            </div>
            <div class="christopherson">
                <img src="images/christofferson.webp">
            </div>
        </div>

        <h3>Quorum of the Twelve Apostles</h3>

    <div class="apostles">
        <div class="apostle"><img src="images/uchtdorf.webp"></div>
        <div class="apostle"><img src="images/bednar.webp"></div>
        <div class="apostle"><img src="images/cook.webp"></div>
        <div class="apostle"><img src="images/anderson.webp"></div>
        <div class="apostle"><img src="images/rasband.webp"></div>
        <div class="apostle"><img src="images/stevenson.webp"></div>
        <div class="apostle"><img src="images/renlund.webp"></div>
        <div class="apostle"><img src="images/gong.webp"></div>
        <div class="apostle"><img src="images/soares.webp"></div>
        <div class="apostle"><img src="images/kearon.webp"></div>
        <div class="apostle"><img src="images/causse.webp"></div>
        <div class="apostle"><img src="images/gilbert.webp"></div>
    </div>

    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }

        #formContainer {
            background-color: #FFF;
            border: solid darkblue 8px;
            border-radius: 15px;
            width: 450px;
            height: 550px;
            justify-self: center;
        }

        .hero {
            background: url(images/jesus_feeds_5000.jpeg);
            background-size: cover;
            height: 150px;
        }

        .hero h1 {
            justify-self: center;
            color: #FFF;
            align-self: center;
        }

        .hero h2 {
            justify-self: center;
            color: #FFF;
            align-self: center;
        }

        h3 {
            padding: 15px;
            justify-self: center;
        }

        .form {
            display: flex;
            flex-direction: column;
        }

        .entry {
            justify-self: center;
            padding: 5px;  
            display: flex;
            justify-content: space-evenly; 
            align-items: center;
            width: 80%
        }

        .entry div {
            white-space: nowrap;
        }

        .entry label {
            margin-right: 100px;
        }

        .check {
            justify-self: center;
            padding: 10px;
        }

        .submit {
            justify-self: center;
            padding: 10px;
        }

        .images {
        display: flex;
        }

        .images img {
        flex: 1;
        object-fit: contain;
        height: 110px;
        width: 50px;
        padding: 2px;
        margin-top: auto;
        }


    </style>




</head>

<body>
    <div id="formContainer">
        <div class="hero">
            <button type="button" id="closeBtn">X</button>
            <h1>Daily Feed</h1>
            <h2>Scripture a Day</h2>
        </div>
        <h3>Sign Up for Daily Scripture Feed</h3>
        <div class="form">
        <form id="myForm">
            <div class="entry">
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>
            </div>

            <div class="entry">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            </div>

            <div class="entry">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            </div>

            <div class="entry">
                <label>Gender:</label>
                <div>
                    <input type="radio" id="male" name="gender" value="male" required>
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female" required>
                    <label for="female">Female</label>
                </div>
            </div>

            <div class="check">
            <section>
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>
            </div>

            <div class="check">
            <section>
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>
            </div>

            <div class="submit">
            <section>
                <button type="submit">Submit</button>
            </section>
            </div>
        </form>
        <div class="images">
        <img src="images/old_testament.webp" alt="Old Testiment">
        <img src="images/new_testament.webp" alt="New Testiment">
        <img src="images/book_of_mormon.webp" alt="Book of Mormon">
        <img src="images/doctrine_and_covenants.webp" alt="Doctrine and Covenants">
        <img src="images/pearl_of_great_price.webp" alt="Pearl of Great Price">
        </div>
        </div>
        
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
